name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[full,dev]" build pip-audit

      - name: Install Qt runtime libraries
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libegl1 libgl1 libxkbcommon-x11-0 libdbus-1-3 libpulse0

      - name: Release gate
        run: |
          python -m pytest
          ruff check src tests
          mypy src/xpst
          pip-audit
          python scripts/scan_public_safety.py --json
          python scripts/release_version_guard.py --tag "${GITHUB_REF_NAME}" --allow-untagged
          python scripts/build_package.py
          python scripts/release_preflight.py --json
          python scripts/clean_install_smoke.py --dist dist --artifact both
          python scripts/verify_desktop_package.py
          QT_QPA_PLATFORM=offscreen python scripts/verify_qml_pages.py
          python scripts/release_artifacts.py --dist dist --output-dir release/python --skip-checks

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-release
          path: release/python/*

      - name: Attest Python artifacts
        uses: actions/attest@v4
        with:
          subject-path: release/python/*

      - name: Publish to PyPI
        if: github.event_name == 'push' && !contains(github.ref_name, '-rc')
        # Non-blocking until PyPI trusted publishing is configured for this
        # repo (owner + PyPI side) — the GitHub release must not be held
        # hostage by the registry step.
        continue-on-error: true
        uses: pypa/gh-action-pypi-publish@release/v1

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3

      - name: Build executable
        shell: pwsh
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[full,dev]" pyinstaller pip-audit build
          python scripts/verify_desktop_package.py
          pyinstaller --clean --noconfirm build_windows.spec

      - name: Sign Windows executable
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if (-not $env:WINDOWS_CERTIFICATE_BASE64) {
            Write-Host "Windows signing skipped; WINDOWS_CERTIFICATE_BASE64 is not configured."
            exit 0
          }
          [IO.File]::WriteAllBytes("xpst-signing.pfx", [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64))
          $env:WINDOWS_CERTIFICATE_PATH = "$PWD\xpst-signing.pfx"
          .\scripts\sign_windows.ps1 -Path dist\xPST.exe
          Remove-Item -LiteralPath "xpst-signing.pfx" -Force

      - name: Smoke Windows executable
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
        run: |
          $smokeArgs = @("--path", "dist\xPST.exe", "--seconds", "12", "--json", "--clean-profile")
          # Require a signature only when signing actually ran (owner ships
          # the RC unsigned until certs are procured).
          if ("${{ github.event_name }}" -eq "push" -and $env:WINDOWS_CERTIFICATE_BASE64) {
            $smokeArgs += "--require-signed"
          }
          python scripts/verify_windows_exe.py @smokeArgs

      - name: Release metadata
        shell: pwsh
        run: |
          python scripts/release_artifacts.py --dist dist --output-dir release/windows --skip-checks

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: release/windows/*

      - name: Attest Windows artifacts
        uses: actions/attest@v4
        with:
          subject-path: release/windows/*

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FFmpeg and Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libegl1 libgl1 libxkbcommon-x11-0 libdbus-1-3 libpulse0

      - name: Build binary
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[full,dev]" pyinstaller pip-audit build
          python scripts/verify_desktop_package.py
          pyinstaller --clean --noconfirm build_linux.spec

      - name: Smoke Linux binary
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python scripts/verify_linux_binary.py --path dist/xPST --seconds 12 --json

      - name: Release metadata
        run: |
          python scripts/release_artifacts.py --dist dist --output-dir release/linux --skip-checks

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: release/linux/*

      - name: Attest Linux artifacts
        uses: actions/attest@v4
        with:
          subject-path: release/linux/*

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FFmpeg
        run: brew install ffmpeg

      - name: Validate macOS build
        env:
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          macos_args=()
          # Public mode requires a codesign identity; the RC ships unsigned
          # by owner decision, so only escalate when secrets are configured.
          if [[ "${{ github.event_name }}" == "push" && -n "$MACOS_CODESIGN_IDENTITY" ]]; then
            macos_args+=(--public)
          fi
          bash scripts/verify_macos.sh "${macos_args[@]}"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: release/*

      - name: Attest macOS artifacts
        uses: actions/attest@v4
        with:
          subject-path: release/*

  github-release:
    if: github.event_name == 'push'
    needs: [build-python, build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          generate_release_notes: true
