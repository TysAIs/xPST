name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libegl1 libgl1 libxkbcommon-x11-0 libxcb-cursor0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[full,dev]" build pip-audit

      - name: Release gate
        run: |
          python -m pytest
          ruff check src tests
          mypy src/xpst
          pip-audit
          python -m build
          QT_QPA_PLATFORM=offscreen python scripts/verify_qml_pages.py
          python scripts/release_artifacts.py --dist dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*

      - name: Publish to PyPI
        if: github.event_name == 'push'
        uses: pypa/gh-action-pypi-publish@release/v1

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FFmpeg
        shell: pwsh
        run: choco install ffmpeg -y --no-progress

      - name: Build executable
        shell: pwsh
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[full,dev]" pyinstaller pip-audit build
          pyinstaller --clean --noconfirm build_windows.spec

      - name: Sign Windows executable
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if (-not $env:WINDOWS_CERTIFICATE_BASE64) {
            Write-Host "Windows signing skipped; WINDOWS_CERTIFICATE_BASE64 is not configured."
            exit 0
          }
          [IO.File]::WriteAllBytes("xpst-signing.pfx", [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64))
          $env:WINDOWS_CERTIFICATE_PATH = "$PWD\xpst-signing.pfx"
          .\scripts\sign_windows.ps1 -Path dist\xPST.exe
          Remove-Item -LiteralPath "xpst-signing.pfx" -Force

      - name: Release metadata
        shell: pwsh
        run: |
          python scripts/release_artifacts.py --dist dist

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-dist
          path: dist/*

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FFmpeg
        run: brew install ffmpeg

      - name: Validate macOS build
        run: bash scripts/verify_macos.sh

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-dist
          path: dist/*

  github-release:
    if: github.event_name == 'push'
    needs: [build-python, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          generate_release_notes: true
