name: CI

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3

      - name: Install package
        shell: bash
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[full,dev]" build pip-audit

      - name: Test
        run: python -m pytest

      - name: Lint
        run: ruff check src tests

      - name: Type check
        run: mypy src/xpst

      - name: Vulnerability audit
        run: pip-audit

      - name: Build package
        run: python -m build

      - name: CLI smoke
        shell: bash
        run: |
          xpst version --json
          xpst health --json
