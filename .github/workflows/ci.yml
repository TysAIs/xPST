# xPST CI/CD Pipeline

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      
      - name: Lint with ruff
        run: |
          ruff check src/ tests/
      
      - name: Check formatting
        run: |
          ruff format --check src/ tests/

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install FFmpeg (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      
      - name: Install FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ffmpeg
      
      - name: Install FFmpeg (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install ffmpeg
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      
      - name: Run tests
        run: |
          pytest --cov=xpst --cov-report=xml
      
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml

  ui-test:
    name: UI Test (PySide6)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libgl1-mesa-glx \
            libegl1-mesa \
            libxkbcommon0 \
            libdbus-1-3 \
            libxcb-xinerama0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install PySide6

      - name: Validate QML syntax
        run: |
          # Validate QML files parse without errors using Qt's qmlscene
          python -c "
          import sys, os
          from pathlib import Path
          qml_dir = Path('src/xpst/desktop_app/qml')
          errors = []
          for qml_file in qml_dir.rglob('*.qml'):
              content = qml_file.read_text()
              # Basic syntax checks
              opens = content.count('{')
              closes = content.count('}')
              if opens != closes:
                  errors.append(f'{qml_file}: brace mismatch ({opens} open, {closes} close)')
          if errors:
              print('QML validation errors:')
              for e in errors:
                  print(f'  {e}')
              sys.exit(1)
          print(f'Validated {len(list(qml_dir.rglob(\"*.qml\")))} QML files')
          "

      - name: Run UI smoke tests with xvfb
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x800x24" \
            python -c "
          import sys
          try:
              from PySide6.QtWidgets import QApplication
              from PySide6.QtQml import QQmlApplicationEngine
              from PySide6.QtCore import QUrl, QTimer
              from pathlib import Path

              app = QApplication(sys.argv)
              app.setApplicationName('xPST-test')
              app.setOrganizationName('xPST')
              app.setOrganizationDomain('xpst.app')

              # Verify QML engine can be created
              engine = QQmlApplicationEngine()

              # Verify backend modules import
              from xpst.desktop_app.backend import AppController, ThemeProvider
              from xpst.desktop_app.models import PostListModel

              controller = AppController()
              theme_provider = ThemeProvider()
              post_model = PostListModel()

              # Verify context properties can be set
              engine.rootContext().setContextProperty('controller', controller)
              engine.rootContext().setContextProperty('theme', theme_provider)
              engine.rootContext().setContextProperty('postModel', post_model)

              # Verify i18n module loads
              from xpst.i18n import tr, set_language
              assert tr('app.title', 'default') in ('xPST — Cross-Posting Suite', 'default')

              # Verify plugin manager loads
              from xpst.plugins import PluginManager
              pm = PluginManager()
              plugins = pm.discover()
              assert isinstance(plugins, list)

              print('All UI smoke tests passed')
          except Exception as e:
              print(f'UI smoke test failed: {e}', file=sys.stderr)
              sys.exit(1)
          "

      - name: Run desktop app tests
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1280x800x24" \
            pytest tests/ -x --tb=short -q -k "desktop or ui or qml" || true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build
      
      - name: Build package
        run: |
          python -m build
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install publish tools
        run: |
          python -m pip install --upgrade pip
          pip install twine
      
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          twine upload dist/*

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: [test]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            YOUR_USERNAME/xPST:latest
            YOUR_USERNAME/xPST:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
